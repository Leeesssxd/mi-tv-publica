name: Actualizar playlist

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas, en UTC

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Importar canales masivos desde upstream MX
        run: >
          python scripts/scrape_channels.py
          https://iptv-org.github.io/iptv/countries/mx.m3u
          --group "Importados"
          --country MX

      - name: Generar playlist y estado
        run: python scripts/build_playlist.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources/channels.json public/playlist.m3u public/status.json public/status.md
          if git diff --cached --quiet; then
            echo "Sin cambios, no se hace commit."
          else
            git commit -m "chore: actualizar canales y playlist [automático]"
            git push
          fi
