name: Actualizar playlist

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas, en UTC

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    env:
      SECRET_UPSTREAM_POOLS: ${{ secrets.SECRET_UPSTREAM_POOLS }}

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Importar canales públicos ampliados
        run: |
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/mx.m3u --group "Importados" --country MX
          python scripts/scrape_channels.py https://raw.githubusercontent.com/Alplox/json-teles/main/canales.json --group "Familia y TV Abierta" --country MX
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/ar.m3u --group "Importados" --country AR
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/bo.m3u --group "Importados" --country BO
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/cl.m3u --group "Importados" --country CL
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/co.m3u --group "Importados" --country CO
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/cr.m3u --group "Importados" --country CR
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/ec.m3u --group "Importados" --country EC
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/es.m3u --group "Importados" --country ES
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/no.m3u --group "Deportes Públicos Internacionales" --country NO
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/pe.m3u --group "Importados" --country PE
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/py.m3u --group "Importados" --country PY
          python scripts/scrape_channels.py https://iptv-org.github.io/iptv/countries/uy.m3u --group "Importados" --country UY

      - name: Generar playlist y estado
        run: python scripts/build_playlist.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/playlist.m3u public/status.json public/status.md public/priority_status.json public/priority_status.md public/telemetry_status.json
          if git diff --cached --quiet; then
            echo "Sin cambios, no se hace commit."
          else
            git commit -m "chore: actualizar playlist pública [automático]"
            git push
          fi
