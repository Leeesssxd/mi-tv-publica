name: Automated Stream Grid Compilation

on:
  schedule:
    # Ejecucion automatizada 3 veces al dia (00:00, 08:00, 16:00 UTC)
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

concurrency:
  group: automated-stream-grid-compilation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Delta Validation Cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/delta_validation/
            .cache/sources/
          key: ${{ runner.os }}-delta-cache-${{ hashFiles('config.json', 'requirements.txt', 'scripts/build_playlist.py', 'scripts/scrape_channels.py') }}
          restore-keys: |
            ${{ runner.os }}-delta-cache-

      - name: Execute Discovery and Aggregation Pipeline
        env:
          SECRET_UPSTREAM_POOLS: ${{ secrets.SECRET_UPSTREAM_POOLS }}
        run: |
          # 1. Ejecutar el descubrimiento masivo de mirrors publicos
          python scripts/scrape_channels.py
          # 2. Compilar la parrilla determinista basandose en el DIAL_MASTER_GRID
          python scripts/build_playlist.py

      - name: Commit and Push Matrix Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add public/playlist.m3u public/status.json public/dial_status.json
          if [ -f sources/discovered_mirrors.json ]; then git add sources/discovered_mirrors.json; fi
          if git diff --quiet && git diff --staged --quiet; then
            echo "No hay cambios para publicar."
            exit 0
          fi
          publish_dir="$(mktemp -d)"
          cp public/playlist.m3u "$publish_dir/playlist.m3u"
          cp public/status.json "$publish_dir/status.json"
          cp public/dial_status.json "$publish_dir/dial_status.json"
          if [ -f sources/discovered_mirrors.json ]; then
            mkdir -p "$publish_dir/sources"
            cp sources/discovered_mirrors.json "$publish_dir/sources/discovered_mirrors.json"
          fi
          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B main origin/main
            mkdir -p public sources
            cp "$publish_dir/playlist.m3u" public/playlist.m3u
            cp "$publish_dir/status.json" public/status.json
            cp "$publish_dir/dial_status.json" public/dial_status.json
            if [ -f "$publish_dir/sources/discovered_mirrors.json" ]; then
              cp "$publish_dir/sources/discovered_mirrors.json" sources/discovered_mirrors.json
            fi
            git add public/playlist.m3u public/status.json public/dial_status.json
            if [ -f sources/discovered_mirrors.json ]; then git add sources/discovered_mirrors.json; fi
            if git diff --quiet && git diff --staged --quiet; then
              echo "Los cambios ya fueron publicados por otra ejecucion."
              exit 0
            fi
            git commit -m "chore: automated grid synchronization [skip ci]"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rechazado en intento ${attempt}; reintentando..."
          done
          echo "No se pudo publicar tras varios intentos."
          exit 1
